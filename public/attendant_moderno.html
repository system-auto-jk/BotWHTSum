<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPanel - Atendimento Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5b7cef;
            --primary-dark: #4a63d8;
            --primary-light: #e8ecff;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --info: #0891b2;
            --bg: #ffffff;
            --bg-light: #f9fafb;
            --bg-lighter: #f3f4f6;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-lighter);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }

        /* ===== LOGIN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #5b7cef 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            top: -150px;
            left: -150px;
            animation: float 6s ease-in-out infinite;
        }

        .login-container::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(30px); }
        }

        .login-box {
            background: white;
            padding: 48px;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #5b7cef);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-lg);
        }

        .login-header h1 {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--bg-light);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(91, 124, 239, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #5b7cef);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== MAIN LAYOUT ===== */
        .container {
            display: flex;
            height: 100vh;
            background: var(--bg-lighter);
        }

        .sidebar {
            width: 340px;
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .status-dot-inline {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot-inline.online { background: #10b981; }
        .status-dot-inline.busy { background: #f59e0b; }
        .status-dot-inline.offline { background: #6b7280; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-selector select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-selector select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 124, 239, 0.1);
        }

        .sidebar-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--bg-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 16px;
        }

        .icon-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .search-box {
            padding: 16px 20px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-light);
            font-size: 13px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .chat-item:hover {
            background: var(--bg-light);
        }

        .chat-item.active {
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
        }

        .chat-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 14px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== MAIN AREA ===== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-lighter);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            box-shadow: var(--shadow-sm);
        }

        .chat-header-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 16px;
        }

        .chat-header-right {
            display: flex;
            gap: 8px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: var(--bg-lighter);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            word-wrap: break-word;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
        }

        .message.received {
            background: #e3f2fd;
            color: #1565c0;
            margin-right: 40px;
            border-left: 4px solid #2196f3;
        }

        .message.sent {
            background: #e8f5e9;
            color: #2e7d32;
            margin-left: 40px;
            text-align: right;
            border-left: 4px solid #4caf50;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-tertiary);
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 14px;
        }

        /* ===== QUICK ACTIONS ===== */
        .quick-actions-section {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .quick-actions-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .quick-action-btn {
            padding: 8px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: var(--text-primary);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .quick-action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* ===== CONTROL BAR ===== */
        .control-bar {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== CHAT INPUT ===== */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: white;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--bg-light);
            border-radius: 12px;
            padding: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 124, 239, 0.1);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: none;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            padding: 8px 0;
        }

        .input-wrapper button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            transition: all 0.2s;
            padding: 6px;
        }

        .input-wrapper button:hover {
            color: var(--primary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #5b7cef);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            max-width: 420px;
            width: 90%;
            animation: slideIn 0.3s ease;
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-light);
            border-radius: 8px;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* ===== ALERT ===== */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease;
            z-index: 2000;
            max-width: 400px;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }

        .alert-info {
            background: #dbeafe;
            color: #0c2340;
            border: 1px solid #bfdbfe;
        }

        .alert-warning {
            background: #fef3c7;
            color: #78350f;
            border: 1px solid #fde68a;
        }

        /* ===== SCROLLBAR ===== */
        .chat-body::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .chat-body::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .no-chats {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .no-chats-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">💬</div>
                <h1>SmartPanel</h1>
                <p>Painel Inteligente de Atendimento</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginInput">Login</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginInput" placeholder="Seu nome de usuário" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordInput">Senha</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordInput" placeholder="Sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" style="display: none;">
        <div class="container">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h1>Conversas</h1>
                    <div class="status-indicator">
                        <div class="status-dot-inline online" id="statusDotInline"></div>
                        <span id="statusTextInline">Online</span>
                    </div>
                    
                    <div class="status-selector">
                        <select id="attendantStatusSelect" onchange="updateAttendantStatus(this.value)">
                            <option value="online">🟢 Online</option>
                            <option value="busy">🟠 Ocupado</option>
                            <option value="offline">🔴 Offline</option>
                        </select>
                    </div>

                    <div class="sidebar-toolbar">
                        <button class="icon-btn" id="logoutBtn" title="Sair">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Pesquisar clientes...">
                </div>

                <div class="chats-list" id="chatsList">
                    <div class="no-chats">
                        <div class="no-chats-icon">💬</div>
                        <div>Nenhuma conversa atribuída</div>
                    </div>
                </div>
            </div>

            <!-- Main Area -->
            <div class="main-area" id="mainArea">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-text">Selecione uma conversa</div>
                    <div class="empty-state-subtext">Escolha um cliente da lista para iniciar o atendimento</div>
                </div>
            </div>
        </div>
    </div>

    <div id="floatingAlertContainer" style="position: fixed; top: 20px; right: 20px; max-width: 400px; z-index: 999;"></div>

    <script>
        const API_BASE = '/api';
        let currentChat = null;
        let currentSession = null;
        let currentAttendant = null;
        let lastMessageCount = 0;
        let historyRefreshInterval = null;

        // Frases rápidas padrão
        const quickPhrases = [
            { text: 'Olá! 👋 Como posso ajudar?', icon: '👋' },
            { text: 'Obrigado! 🙏', icon: '🙏' },
            { text: 'Entendi, deixe-me verificar!', icon: '⏳' },
            { text: 'Transferindo para especialista...', icon: '📞' },
            { text: 'Problema resolvido? ✅', icon: '✅' },
            { text: 'Precisa de mais ajuda?', icon: '❓' }
        ];

        // ===== LOGIN =====
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const login = document.getElementById('loginInput').value;
            const password = document.getElementById('passwordInput').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            try {
                const response = await fetch(`${API_BASE}/attendance/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    currentAttendant = data.attendant;
                    currentAttendant.status = 'online';
                    
                    localStorage.setItem('attendantId', currentAttendant.id);
                    localStorage.setItem('attendantName', currentAttendant.name);
                    localStorage.setItem('attendantStatus', 'online');

                    showDashboard();
                } else {
                    const error = await response.json();
                    showAlert(error.message || 'Login falhou', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                showAlert('Erro de conexão', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('attendantNameDisplay').innerHTML = `👤 ${currentAttendant.name}`;
            updateStatusUI(currentAttendant.status);
            loadChats();
        }

        // ===== CARREGAR CONVERSAS =====
        async function loadChats() {
            try {
                const response = await fetch(`${API_BASE}/attendance/sessions?attendantId=${currentAttendant.id}`);
                if (response.ok) {
                    const chats = await response.json();
                    renderChatsList(chats);
                }
            } catch (error) {
                console.error('Erro ao carregar conversas:', error);
            }
        }

        function renderChatsList(chats) {
            const chatsList = document.getElementById('chatsList');
            
            if (!chats || chats.length === 0) {
                chatsList.innerHTML = `
                    <div class="no-chats">
                        <div class="no-chats-icon">💬</div>
                        <div style="font-weight: 600; margin-bottom: 4px;">Nenhuma conversa</div>
                        <div style="font-size: 12px;">Novas conversas aparecerão aqui</div>
                    </div>
                `;
                return;
            }

            const html = chats.map(chat => `
                <div class="chat-item ${currentChat?.sessionId === chat.sessionId ? 'active' : ''}" onclick="selectChat('${chat.sessionId}', '${chat.clientName}', '${chat.clientJid}')">
                    <div class="chat-name">${chat.clientName}</div>
                    <div class="chat-preview">${chat.lastMessage || 'Nenhuma mensagem'}</div>
                </div>
            `).join('');

            chatsList.innerHTML = html;
        }

        async function selectChat(sessionId, name, jid) {
            currentChat = { sessionId, name, jid };
            
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.chat-item').classList.add('active');
            
            try {
                const response = await fetch(`${API_BASE}/attendance/session/${jid}`);
                if (response.ok) {
                    currentSession = await response.json();
                    renderChatView(name);
                } else {
                    showAlert('Erro ao carregar conversa', 'error');
                }
            } catch (error) {
                console.error('Erro ao carregar sessão:', error);
                showAlert('Erro ao carregar conversa', 'error');
            }
        }

        function renderChatView(name) {
            const mainArea = document.getElementById('mainArea');
            
            if (historyRefreshInterval) {
                clearInterval(historyRefreshInterval);
                historyRefreshInterval = null;
            }
            
            if (!currentSession) {
                mainArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⏳</div>
                        <div class="empty-state-text">Carregando conversa...</div>
                    </div>
                `;
                return;
            }

            mainArea.innerHTML = `
                <div class="chat-header">
                    <div class="chat-header-title">${name}</div>
                    <div class="chat-header-right">
                        <button class="icon-btn" onclick="toggleBotStatus()" title="Alternar bot">
                            <i class="fas fa-robot"></i>
                        </button>
                        <button class="icon-btn" onclick="endSession()" title="Finalizar atendimento">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <div class="chat-body" id="chatBody">
                    <div style="text-align: center; color: var(--text-tertiary); padding: 20px;">
                        <i class="fas fa-spinner fa-spin"></i> Carregando histórico...
                    </div>
                </div>

                <div class="quick-actions-section">
                    <div class="quick-actions-title">Respostas Rápidas</div>
                    <div class="quick-actions-grid" id="quickActionsGrid"></div>
                </div>

                <div class="control-bar">
                    <div class="status-indicator">
                        <i class="fas fa-robot"></i>
                        Bot: <span id="botStatusText">Ativo</span>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Digite sua mensagem..." >
                        <button onclick="attachFile()" title="Anexar arquivo">
                            <i class="fas fa-paperclip"></i>
                        </button>
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            `;

            renderQuickActions();
            loadChatHistory();
            updateBotStatus();

            if (historyRefreshInterval) {
                clearInterval(historyRefreshInterval);
            }
            historyRefreshInterval = setInterval(() => {
                checkNewMessages();
            }, 1000);

            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        async function loadChatHistory() {
            try {
                const response = await fetch(`${API_BASE}/attendance/client/${currentSession.clientJid}/full-history`);
                const messages = await response.json();
                
                const chatBody = document.getElementById('chatBody');
                
                if (messages.length === 0) {
                    chatBody.innerHTML = '<div style="text-align: center; color: var(--text-tertiary); padding: 40px;">Nenhuma mensagem ainda</div>';
                    lastMessageCount = 0;
                    return;
                }

                const messagesHTML = messages.map(msg => {
                    let text = msg.text;
                    let type = msg.type || 'received';
                    let timestamp = msg.timestamp || Date.now();

                    if (msg.role) {
                        text = msg.parts?.[0]?.text || '';
                        type = msg.role === 'model' ? 'sent' : 'received';
                        timestamp = msg.timestamp || Date.now();
                    }

                    if (!text || !text.trim().length) return '';

                    const time = new Date(timestamp).toLocaleTimeString('pt-BR', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    return `
                        <div class="message ${type}">
                            ${escapeHtml(text)}<br/>
                            <small style="opacity: 0.7; font-size: 11px;">${time}</small>
                        </div>
                    `;
                }).join('');

                chatBody.innerHTML = messagesHTML;
                lastMessageCount = messages.length;
                
                setTimeout(() => {
                    chatBody.scrollTop = chatBody.scrollHeight;
                }, 0);
            } catch (error) {
                console.error('Erro ao carregar histórico:', error);
            }
        }

        async function checkNewMessages() {
            if (!currentSession) return;

            try {
                const response = await fetch(`${API_BASE}/attendance/client/${currentSession.clientJid}/full-history`);
                const messages = await response.json();

                if (messages.length > lastMessageCount) {
                    const chatBody = document.getElementById('chatBody');
                    if (chatBody) {
                        const isAtBottom = chatBody.scrollHeight - chatBody.scrollTop - chatBody.clientHeight < 50;

                        const messagesHTML = messages.map(msg => {
                            let text = msg.text;
                            let type = msg.type || 'received';
                            let timestamp = msg.timestamp || Date.now();

                            if (msg.role) {
                                text = msg.parts?.[0]?.text || '';
                                type = msg.role === 'model' ? 'sent' : 'received';
                            }

                            if (!text || !text.trim().length) return '';

                            const time = new Date(timestamp).toLocaleTimeString('pt-BR', {
                                hour: '2-digit',
                                minute: '2-digit'
                            });

                            return `
                                <div class="message ${type}">
                                    ${escapeHtml(text)}<br/>
                                    <small style="opacity: 0.7; font-size: 11px;">${time}</small>
                                </div>
                            `;
                        }).join('');

                        chatBody.innerHTML = messagesHTML;
                        lastMessageCount = messages.length;
                        
                        if (isAtBottom) {
                            setTimeout(() => {
                                chatBody.scrollTop = chatBody.scrollHeight;
                            }, 0);
                        }
                    }
                }
            } catch (error) {
                console.error('Erro ao verificar novas mensagens:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();

            if (!msg) return;

            try {
                const response = await fetch(`${API_BASE}/attendance/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: currentSession.sessionId,
                        message: msg
                    })
                });

                if (response.ok) {
                    input.value = '';
                    await loadChatHistory();
                } else {
                    showAlert('Erro ao enviar mensagem', 'error');
                }
            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                showAlert('Erro de conexão', 'error');
            }
        }

        function renderQuickActions() {
            const grid = document.getElementById('quickActionsGrid');
            grid.innerHTML = quickPhrases.map(phrase => `
                <button class="quick-action-btn" onclick="sendMessage('${phrase.text.replace(/'/g, "\\'")}')" title="${phrase.text}">
                    ${phrase.icon} ${phrase.text.substring(0, 15)}${phrase.text.length > 15 ? '...' : ''}
                </button>
            `).join('');
        }

        async function toggleBotStatus() {
            try {
                const response = await fetch(`${API_BASE}/attendance/session/${currentSession.sessionId}/bot-toggle`, {
                    method: 'POST'
                });

                if (response.ok) {
                    currentSession = await response.json();
                    updateBotStatus();
                    showAlert(`Bot ${currentSession.botEnabled ? 'ativado' : 'desativado'}`, 'info');
                }
            } catch (error) {
                console.error('Erro ao alternar bot:', error);
                showAlert('Erro ao alternar bot', 'error');
            }
        }

        function updateBotStatus() {
            const statusText = document.getElementById('botStatusText');
            if (statusText && currentSession) {
                statusText.textContent = currentSession.botEnabled ? 'Ativo' : 'Inativo';
                statusText.style.color = currentSession.botEnabled ? '#10b981' : '#6b7280';
            }
        }

        async function endSession() {
            if (!confirm('Tem certeza que deseja finalizar este atendimento?')) return;

            try {
                if (historyRefreshInterval) {
                    clearInterval(historyRefreshInterval);
                    historyRefreshInterval = null;
                }

                const response = await fetch(`${API_BASE}/attendance/session/${currentSession.sessionId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('Atendimento finalizado', 'success');
                    currentChat = null;
                    currentSession = null;
                    lastMessageCount = 0;
                    document.getElementById('mainArea').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <div class="empty-state-text">Selecione uma conversa</div>
                            <div class="empty-state-subtext">Escolha um cliente da lista para iniciar o atendimento</div>
                        </div>
                    `;
                    await loadChats();
                }
            } catch (error) {
                console.error('Erro ao finalizar sessão:', error);
                showAlert('Erro ao finalizar atendimento', 'error');
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('floatingAlertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                ${type === 'success' ? '<i class="fas fa-check-circle"></i>' : ''}
                ${type === 'error' ? '<i class="fas fa-exclamation-circle"></i>' : ''}
                ${type === 'info' ? '<i class="fas fa-info-circle"></i>' : ''}
                ${type === 'warning' ? '<i class="fas fa-warning"></i>' : ''}
                ${message}
            `;
            container.appendChild(alert);

            setTimeout(() => alert.remove(), 3000);
        }

        function attachFile() {
            showAlert('Upload de arquivos em desenvolvimento', 'info');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function updateAttendantStatus(status) {
            try {
                const response = await fetch(`${API_BASE}/attendance/attendants/${currentAttendant.id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    updateStatusUI(status);
                    showAlert(`Status alterado para ${status === 'online' ? 'Online' : status === 'busy' ? 'Ocupado' : 'Offline'}`, 'info');
                } else {
                    showAlert('Erro ao atualizar status', 'error');
                }
            } catch (error) {
                console.error('Erro ao atualizar status:', error);
                showAlert('Erro ao atualizar status', 'error');
            }
        }

        function updateStatusUI(status) {
            const statusDot = document.getElementById('statusDotInline');
            const statusText = document.getElementById('statusTextInline');
            const selector = document.getElementById('attendantStatusSelect');

            statusDot.className = 'status-dot-inline';
            statusDot.classList.add(status);
            
            const statusLabels = {
                online: '🟢 Online',
                busy: '🟠 Ocupado',
                offline: '🔴 Offline'
            };
            
            statusText.textContent = statusLabels[status].split(' ')[1];
            selector.value = status;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.chat-item').forEach(item => {
                const name = item.querySelector('.chat-name').textContent.toLowerCase();
                item.style.display = name.includes(query) ? '' : 'none';
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem('attendantId');
                localStorage.removeItem('attendantName');
                localStorage.removeItem('attendantStatus');
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardScreen').style.display = 'none';
                document.getElementById('loginInput').value = '';
                document.getElementById('passwordInput').value = '';
            }
        });

        window.addEventListener('load', () => {
            const attendantId = localStorage.getItem('attendantId');
            const attendantName = localStorage.getItem('attendantName');
            
            if (attendantId && attendantName) {
                currentAttendant = {
                    id: attendantId,
                    name: attendantName,
                    status: localStorage.getItem('attendantStatus') || 'online'
                };
                showDashboard();
            }
        });

        setInterval(() => {
            if (currentAttendant) {
                loadChats();
            }
        }, 10000);
    </script>
</body>
</html>
