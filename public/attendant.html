        function handleTyping() {
            if (typingTimeout) {
                clearTimeout(typingTimeout);
            }

            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.style.display = 'flex';
            }

            typingTimeout = setTimeout(() => {
                if (indicator) {
                    indicator.style.display = 'none';
                }
            }, 2000);
        }

        async function openHistoryModal() {
            if (!currentAttendant?.id) return;
            const modal = document.getElementById('historyModal');
            const list = document.getElementById('historyListContainer');
            const header = document.getElementById('historyConversationHeader');
            const body = document.getElementById('historyConversationBody');
            if (!modal || !list || !header || !body) return;

            modal.style.display = 'flex';
            list.innerHTML = '<div style="padding:12px; color:#64748b;">Carregando...</div>';
            header.textContent = 'Selecione um numero';
            body.innerHTML = '<div style="padding:20px; color:#64748b;">Selecione um atendimento para visualizar o historico.</div>';

            try {
                const response = await fetch(`${API_BASE}/attendance/attendant/${currentAttendant.id}/history?_ts=${Date.now()}`, { cache: 'no-store' });
                const data = await response.json();
                const items = Array.isArray(data?.items) ? data.items : [];

                if (!items.length) {
                    list.innerHTML = '<div style="padding:12px; color:#64748b;">Nenhum historico encontrado.</div>';
                    return;
                }

                list.innerHTML = items.map(item => {
                    const jid = item.clientJid || '';
                    const when = item.lastMessageAt ? new Date(item.lastMessageAt).toLocaleString('pt-BR') : 'Sem data';
                    const status = item.isActive ? 'Em atendimento' : 'Finalizado';
                    const preview = escapeHtml(item.lastMessagePreview || 'Sem mensagens');
                    return `
                        <button class="history-item-btn" data-jid="${jid}" style="width:100%; text-align:left; border:1px solid #e5e7eb; background:#fff; border-radius:10px; padding:10px; margin-bottom:8px; cursor:pointer;">
                            <div style="font-weight:600; color:#0f172a;">${jid}</div>
                            <div style="font-size:12px; color:#64748b;">${status} • ${when}</div>
                            <div style="font-size:12px; color:#334155; margin-top:4px;">${preview}</div>
                        </button>
                    `;
                }).join('');

                list.querySelectorAll('.history-item-btn').forEach(btn => {
                    btn.addEventListener('click', () => loadHistoricalConversation(btn.getAttribute('data-jid')));
                });
            } catch (error) {
                console.error('Erro ao carregar historico do atendente:', error);
                list.innerHTML = '<div style="padding:12px; color:#dc2626;">Erro ao carregar historico.</div>';
            }
        }

        function closeHistoryModal() {
            const modal = document.getElementById('historyModal');
            if (modal) modal.style.display = 'none';
        }

        async function loadHistoricalConversation(clientJid) {
            if (!currentAttendant?.id || !clientJid) return;
            const header = document.getElementById('historyConversationHeader');
            const body = document.getElementById('historyConversationBody');
            if (!header || !body) return;

            header.textContent = `Historico: ${clientJid}`;
            body.innerHTML = '<div style="padding:12px; color:#64748b;">Carregando conversa...</div>';

            try {
                const response = await fetch(`${API_BASE}/attendance/attendant/${currentAttendant.id}/history/${encodeURIComponent(clientJid)}?_ts=${Date.now()}`, { cache: 'no-store' });
                const data = await response.json();
                const messages = Array.isArray(data?.messages) ? data.messages : [];

                if (!messages.length) {
                    body.innerHTML = '<div style="padding:12px; color:#64748b;">Sem mensagens nesse atendimento.</div>';
                    return;
                }

                body.innerHTML = messages.map(msg => {
                    const parsed = parseMessageForView(msg);
                    const isAttendant = parsed.type === 'attendant';
                    const align = isAttendant ? 'right' : 'left';
                    const bubbleColor = isAttendant ? '#dcfce7' : parsed.type === 'bot' ? '#e0f2fe' : '#fff';
                    return `
                        <div style="text-align:${align}; margin-bottom:10px;">
                            <div style="display:inline-block; max-width:85%; background:${bubbleColor}; border:1px solid #e5e7eb; border-radius:10px; padding:8px 10px;">
                                <div style="font-size:11px; color:#475569; margin-bottom:4px;">${escapeHtml(parsed.author)}</div>
                                <div style="font-size:13px; color:#0f172a; white-space:pre-wrap;">${escapeHtml(parsed.text)}</div>
                                <div style="font-size:10px; color:#64748b; margin-top:4px;">${formatTime(parsed.timestamp)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                body.scrollTop = body.scrollHeight;
            } catch (error) {
                console.error('Erro ao carregar conversa historica:', error);
                body.innerHTML = '<div style="padding:12px; color:#dc2626;">Erro ao carregar conversa.</div>';
            }
        }

        async function loadHandoffContext() {
            if (!currentSession?.sessionId) return;
            try {
                const response = await fetch(`${API_BASE}/attendance/session/${currentSession.sessionId}/handoff-context`);
                if (!response.ok) return;
                const data = await response.json();
                const context = data?.context;
                if (!context) return;

                const card = document.getElementById('handoffContextCard');
                if (!card) return;

                const priority = context.handoff?.priority || 'normal';
                const skill = context.handoff?.requestedSkill || 'geral';
                const queueWait = context.metrics?.queueWaitSeconds;
                const summary = context.handoff?.summary || context.handoff?.reason || 'Sem resumo enviado pela IA.';
                const reason = context.handoff?.reason || '';
                const tags = Array.isArray(context.handoff?.tags) ? context.handoff.tags.join(', ') : '';
                const detail = summary && summary !== reason ? summary : '';

                card.style.display = 'block';
                card.innerHTML = `
                    <strong>Contexto do pedido</strong><br>
                    Prioridade: <strong>${priority}</strong> | Skill: <strong>${skill}</strong>${queueWait ? ` | Espera: <strong>${queueWait}s</strong>` : ''}<br>
                    ${reason ? `<div><strong>Origem do atendimento:</strong> ${escapeHtml(reason)}</div>` : ''}
                    ${detail ? `<div><strong>Resumo:</strong> ${escapeHtml(detail)}</div>` : ''}
                    ${tags ? `<div style="margin-top:4px; opacity:.8;"><strong>Tags:</strong> ${escapeHtml(tags)}</div>` : ''}
                `;
            } catch (error) {
                console.error('Erro ao carregar contexto de handoff:', error);
            }
        }

        function startSessionTimer() {
            if (!currentSession) return;

            if (sessionTimerInterval) {
                clearInterval(sessionTimerInterval);
            }

            const startTime = currentSession.startTime || Date.now();
            const timerElement = document.getElementById('sessionTimer');
            
            if (timerElement) {
                sessionTimerInterval = setInterval(() => {
                    if (!currentSession) {
                        clearInterval(sessionTimerInterval);
                        sessionTimerInterval = null;
                        return;
                    }
                    
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }, 1000);
            }
        }

        function parseMessageForView(msg) {
            let text = '';
            let author = 'Cliente';
            let type = 'client';
            const timestamp = msg.timestamp || Date.now();

            if (msg.text) {
                text = msg.text;
            } else if (msg.parts?.[0]?.text) {
                text = msg.parts[0].text;
            }

            if (msg.type === 'attendant') {
                type = 'attendant';
                author = 'Você (Atendente)';
            } else if (msg.type === 'bot') {
                type = 'bot';
                author = 'Bot IA';
            } else if (msg.type === 'client') {
                type = 'client';
                author = 'Cliente';
            } else if (msg.role) {
                type = msg.role === 'model' ? 'bot' : 'client';
                author = msg.role === 'model' ? 'Bot IA' : 'Cliente';
            } else if (msg.fromMe) {
                type = 'attendant';
                author = 'Você (Atendente)';
            }

            return { text, author, type, timestamp };
        }

        function renderMessageBubble(msg) {
            const parsed = parseMessageForView(msg);
            if (!parsed.text || !parsed.text.trim().length) return '';

            const time = formatTime(parsed.timestamp);
            const statusTick = parsed.type === 'attendant' ? '<span style="margin-left: 6px; opacity: .7;">✓✓</span>' : '';

            return `
                <div class="message ${parsed.type}">
                    <div class="message-header">${parsed.author}</div>
                    <div class="message-content">${escapeHtml(parsed.text)}</div>
                    <div class="message-time">${time}${statusTick}</div>
                </div>
            `;
        }

        async function loadChatHistory() {
            try {
                const response = await fetch(`${API_BASE}/attendance/client/${currentSession.clientJid}/full-history`);
                const messages = await response.json();

                const chatBody = document.getElementById('chatBody');

                if (messages.length === 0) {
                    chatBody.innerHTML = '<div style="text-align: center; color: var(--text-tertiary); padding: 40px;">Nenhuma mensagem ainda</div>';
                    lastMessageCount = 0;
                    return;
                }

                const messagesHTML = messages.map(renderMessageBubble).filter(html => html.length > 0).join('');

                chatBody.innerHTML = messagesHTML || '<div style="text-align: center; color: var(--text-tertiary); padding: 40px;">Nenhuma mensagem ainda</div>';
                lastMessageCount = messages.length;
                
                setTimeout(() => {
                    chatBody.scrollTop = chatBody.scrollHeight;
                }, 0);
            } catch (error) {
                console.error('Erro ao carregar histórico:', error);
                const chatBody = document.getElementById('chatBody');
                if (chatBody) {
                    chatBody.innerHTML = '<div style="text-align: center; color: var(--text-danger); padding: 40px;">Erro ao carregar histórico</div>';
                }
            }
        }

        async function checkNewMessages() {
            if (!currentSession) return;

            try {
                const response = await fetch(`${API_BASE}/attendance/client/${currentSession.clientJid}/full-history`);
                const messages = await response.json();

                if (messages.length > lastMessageCount) {
                    const chatBody = document.getElementById('chatBody');
                    if (chatBody) {
                        const isAtBottom = chatBody.scrollHeight - chatBody.scrollTop - chatBody.clientHeight < 50;

                        const newMessages = messages.slice(lastMessageCount);
                        const messagesHTML = newMessages.map(renderMessageBubble).filter(html => html.length > 0).join('');

                        chatBody.insertAdjacentHTML('beforeend', messagesHTML);
                        lastMessageCount = messages.length;

                        if (isAtBottom) {
                            setTimeout(() => {
                                chatBody.scrollTop = chatBody.scrollHeight;
                            }, 0);
                        }

                        // Show notification for new messages
                        if (newMessages.some(m => m.type === 'client')) {
                            showNotification('Nova mensagem do cliente', currentSession.clientName);
                        }
                    }
                }
            } catch (error) {
                console.error('Erro ao verificar novas mensagens:', error);
            }
        }

        function showNotification(title, body) {
            if (!("Notification" in window)) return;
            
            if (Notification.permission === "granted") {
                new Notification(title, { body });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification(title, { body });
                    }
                });
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();

            if (!msg || currentSession?.botEnabled) return;

            // Desabilitar input enquanto envia
            const sendBtn = document.getElementById('sendBtn');
            const originalBtn = sendBtn.innerHTML;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(`${API_BASE}/attendance/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: currentSession.sessionId,
                        message: msg,
                        fromAttendant: true
                    })
                });

                if (response.ok) {
                    input.value = '';
                    input.style.height = 'auto';
                    // Aguardar um pouco para garantir que a mensagem foi salva
                    setTimeout(() => {
                        loadChatHistory();
                    }, 300);
                } else {
                    showAlert('Erro ao enviar mensagem', 'error');
                }
            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                showAlert('Erro de conexão', 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = originalBtn;
            }
        }

        function renderQuickActions() {
            const grid = document.getElementById('quickActionsGrid');
            grid.innerHTML = quickPhrases.map((phrase, idx) => `
                <button class="quick-action-btn" onclick="quickActionClick(${idx})" title="${phrase.text}">
                    ${phrase.icon} ${phrase.text.substring(0, 15)}${phrase.text.length > 15 ? '...' : ''}
                </button>
            `).join('');
        }

        function quickActionClick(index) {
            if (currentSession?.botEnabled) {
                showAlert('Bot está ativo, desative para enviar mensagens', 'warning');
                return;
            }
            
            const phrase = quickPhrases[index];
            const input = document.getElementById('messageInput');
            if (input) {
                input.value = phrase.text;
                input.focus();
            }
        }

        function showEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.classList.toggle('show');
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input && !currentSession?.botEnabled) {
                input.value += emoji;
                input.focus();
                document.getElementById('emojiPicker').classList.remove('show');
            }
        }

        async function toggleBotStatus() {
            try {
                const response = await fetch(`${API_BASE}/attendance/session/${currentSession.sessionId}/bot-toggle`, {
                    method: 'POST'
                });

                if (response.ok) {
                    currentSession = await response.json();
                    updateBotStatus();
                    
                    // Enable/disable input based on bot status
                    const input = document.getElementById('messageInput');
                    const sendBtn = document.getElementById('sendBtn');
                    const attachBtn = document.querySelector('.input-wrapper button:first-child');
                    const emojiBtn = document.querySelector('.input-wrapper button:last-child');
                    
                    if (input && sendBtn) {
                        const disabled = currentSession.botEnabled;
                        input.disabled = disabled;
                        sendBtn.disabled = disabled;
                        if (attachBtn) attachBtn.disabled = disabled;
                        if (emojiBtn) emojiBtn.disabled = disabled;
                    }
                    
                    showAlert(`Bot ${currentSession.botEnabled ? 'ativado' : 'desativado'}`, 'info');
                }
            } catch (error) {
                console.error('Erro ao alternar bot:', error);
                showAlert('Erro ao alternar bot', 'error');
            }
        }

        function updateBotStatus() {
            const statusText = document.getElementById('botStatusText');
            const botButton = document.querySelector('[onclick="toggleBotStatus()"] i');
            
            if (statusText && currentSession) {
                statusText.textContent = currentSession.botEnabled ? 'Ativo' : 'Inativo';
                statusText.style.color = currentSession.botEnabled ? '#10b981' : '#6b7280';
            }
            
            if (botButton) {
                botButton.style.color = currentSession.botEnabled ? 'var(--primary)' : 'inherit';
            }
        }

        function updateReviewOutcomeOptions() {
            const nature = document.getElementById('reviewNature')?.value || 'outro';
            const outcomeSelect = document.getElementById('reviewOutcome');
            if (!outcomeSelect) return;

            const optionsByNature = {
                contratacao: [
                    { value: 'contratou', label: 'Contratou' },
                    { value: 'proposta_enviada', label: 'Proposta enviada' },
                    { value: 'nao_contratou', label: 'Nao contratou' }
                ],
                comercial: [
                    { value: 'resolvido', label: 'Resolvido' },
                    { value: 'aguardando_retorno', label: 'Aguardando retorno' },
                    { value: 'nao_resolvido', label: 'Nao resolvido' }
                ],
                default: [
                    { value: 'resolvido', label: 'Resolvido' },
                    { value: 'parcial', label: 'Parcial' },
                    { value: 'nao_resolvido', label: 'Nao resolvido' }
                ]
            };

            const selected = optionsByNature[nature] || optionsByNature.default;
            outcomeSelect.innerHTML = selected.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
        }

        function openSessionReviewModal() {
            if (!currentSession?.sessionId) return;
            const modal = document.getElementById('sessionReviewModal');
            if (!modal) return;
            document.getElementById('reviewRating').value = 'bom';
            document.getElementById('reviewNature').value = 'duvida';
            document.getElementById('reviewNotes').value = '';
            updateReviewOutcomeOptions();
            modal.style.display = 'flex';
        }

        function closeSessionReviewModal() {
            const modal = document.getElementById('sessionReviewModal');
            if (modal) modal.style.display = 'none';
        }

        async function submitSessionReviewAndEnd() {
            if (!currentSession?.sessionId) return;

            const nature = document.getElementById('reviewNature')?.value || 'outro';
            const outcome = document.getElementById('reviewOutcome')?.value || 'nao_resolvido';
            const rating = document.getElementById('reviewRating')?.value || 'bom';
            const notes = document.getElementById('reviewNotes')?.value || '';
            const resolved = outcome === 'resolvido' || outcome === 'contratou' || outcome === 'proposta_enviada';
            const contracted = outcome === 'contratou';

            try {
                await fetch(`${API_BASE}/attendance/session/${currentSession.sessionId}/review`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nature,
                        outcome,
                        resolved,
                        contracted,
                        notes: `[rating:${rating}] ${notes}`.trim()
                    })
                });
            } catch (error) {
                console.error('Erro ao salvar avaliacao:', error);
            }

            await endSession(true);
        }

        async function endSession(skipConfirm = false) {
            if (!skipConfirm) {
                openSessionReviewModal();
                return;
            }

            try {
                if (historyRefreshInterval) {
                    clearInterval(historyRefreshInterval);
                    historyRefreshInterval = null;
                }

                const response = await fetch(`${API_BASE}/attendance/session/${currentSession.sessionId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    closeSessionReviewModal();
                    showAlert('Atendimento finalizado', 'success');
                    currentChat = null;
                    currentSession = null;
                    lastMessageCount = 0;
                    document.getElementById('mainArea').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-comments"></i></div>
                            <div class="empty-state-text">Selecione uma conversa</div>
                            <div class="empty-state-subtext">Escolha um cliente da lista para iniciar o atendimento</div>
                        </div>
                    `;
                    await loadChats();
                    await loadQueuePanel();
                }
            } catch (error) {
                console.error('Erro ao finalizar sessao:', error);
                showAlert('Erro ao finalizar atendimento', 'error');
            }
        }

        async function loadQueuePanel() {
            try {
                const badge = document.getElementById('queueCountBadge');
                const preview = document.getElementById('queuePreviewText');
                const list = document.getElementById('queueContactsList');
                if (!badge || !preview || !list) return;

                const response = await fetch(`${API_BASE}/attendance/queue?_ts=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();
                const queue = Array.isArray(data.queue) ? data.queue : [];
                const count = Number(data.totalWaiting || queue.length || 0);

                badge.textContent = String(count);
                if (queue.length > 0) {
                    const next = queue[0];
                    preview.textContent = `Proximo: ${next.clientName || next.clientJid || 'Cliente'} (${next.clientJid || ''})`;
                    list.innerHTML = queue.map((item, idx) => `
                        <div style="border:1px solid #e5e7eb; border-radius:8px; padding:6px; background:#fff;">
                            <div style="font-size:11px; font-weight:600; color:#0f172a;">#${idx + 1} ${item.clientName || 'Cliente'}</div>
                            <div style="font-size:10px; color:#64748b; margin-bottom:6px;">${item.clientJid || ''}</div>
                            <button class="btn btn-sm btn-primary" style="width:100%;" onclick="startQueuedClient('${item.clientJid || ''}')">
                                <i class="fas fa-play"></i> Iniciar atendimento
                            </button>
                        </div>
                    `).join('');
                } else {
                    preview.textContent = 'Nenhum cliente aguardando.';
                    list.innerHTML = '<div style="font-size:11px; color:#94a3b8; padding:4px 2px;">Sem contatos na fila.</div>';
                }
            } catch (error) {
                console.error('Erro ao carregar fila do atendente:', error);
            }
        }

        async function startQueuedClient(clientJid) {
            if (!currentAttendant?.id) return;
            if (!clientJid) return;
            try {
                const response = await fetch(`${API_BASE}/attendance/attendants/${currentAttendant.id}/start-queued`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientJid })
                });
                const data = await response.json();
                if (!response.ok) {
                    showAlert(data.error || 'Nao foi possivel iniciar atendimento deste contato', 'warning');
                    await loadQueuePanel();
                    return;
                }

                showAlert('Atendimento iniciado com sucesso', 'success');
                await loadChats();
                await loadQueuePanel();
            } catch (error) {
                console.error('Erro ao iniciar cliente da fila:', error);
                showAlert('Erro ao iniciar atendimento da fila', 'error');
            }
        }

        function attachFile() {
            if (currentSession?.botEnabled) {
                showAlert('Bot está ativo, desative para anexar arquivos', 'warning');
                return;
            }
            
            // Create file input
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*,.pdf,.doc,.docx,.txt';
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    // Here you would implement file upload
                    showAlert(`Arquivo "${file.name}" selecionado. Upload em desenvolvimento`, 'info');
                }
            };
            fileInput.click();
        }

        async function updateAttendantStatus(status, options = {}) {
            if (!currentAttendant?.id) return false;
            const normalizedStatus = normalizeStatus(status);
            const notify = options.notify !== false;
            const keepalive = options.keepalive === true;
            const persistPreferred = options.persistPreferred !== false;

            try {
                const response = await fetch(`${API_BASE}/attendance/attendants/${currentAttendant.id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: normalizedStatus }),
                    keepalive
                });

                if (response.ok) {
                    currentAttendant.status = normalizedStatus;
                    updateStatusUI(normalizedStatus);
                    
                    // Save status
                    if (localStorage.getItem('rememberMe')) {
                        localStorage.setItem('attendantStatus', normalizedStatus);
                    } else {
                        sessionStorage.setItem('attendantStatus', normalizedStatus);
                    }

                    if (persistPreferred) {
                        persistPreferredStatus(normalizedStatus);
                    }
                    
                    if (notify) {
                        const label = normalizedStatus === 'online'
                            ? 'Disponível'
                            : normalizedStatus === 'busy'
                                ? 'Em atendimento'
                                : 'Offline';
                        showAlert(`Status alterado para ${label}`, 'info');
                    }
                    return true;
                } else {
                    if (notify) showAlert('Erro ao atualizar status', 'error');
                }
            } catch (error) {
                console.error('Erro ao atualizar status:', error);
                if (notify) showAlert('Erro ao atualizar status', 'error');
            }
            return false;
        }

        function stopPresenceHeartbeat() {
            if (presenceHeartbeatInterval) {
                clearInterval(presenceHeartbeatInterval);
                presenceHeartbeatInterval = null;
            }
        }

        function startPresenceHeartbeat() {
            stopPresenceHeartbeat();
            presenceHeartbeatInterval = setInterval(() => {
                if (!currentAttendant) return;
                updateAttendantStatus(currentAttendant.status || readPreferredStatus(), {
                    notify: false,
                    persistPreferred: false
                });
            }, 15000);
        }

        function updateStatusUI(status) {
            const normalized = normalizeStatus(status);
            const statusDot = document.getElementById('statusDotInline');
            const statusText = document.getElementById('statusTextInline');
            const selector = document.getElementById('attendantStatusSelect');

            statusDot.className = 'status-dot-inline';
            statusDot.classList.add(normalized);

            const statusLabels = {
                online: 'Disponível',
                busy: 'Em atendimento',
                offline: 'Offline'
            };

            statusText.textContent = statusLabels[normalized] || 'Disponível';
            selector.value = normalized;
        }

        // ===== INITIALIZATION =====
        window.addEventListener('load', () => {
            // Check for saved session
            const attendantId = localStorage.getItem('attendantId') || sessionStorage.getItem('attendantId');
            const attendantName = localStorage.getItem('attendantName') || sessionStorage.getItem('attendantName');
            const attendantStatus = readPreferredStatus();

            if (attendantId && attendantName) {
                currentAttendant = {
                    id: attendantId,
                    name: attendantName,
                    status: 'online'
                };
                localStorage.setItem('attendantStatus', 'online');
                sessionStorage.setItem('attendantStatus', 'online');
                persistPreferredStatus('online');
                
                // Check remember me checkbox if using localStorage
                if (localStorage.getItem('rememberMe')) {
                    document.getElementById('rememberMe').checked = true;
                }
                
                showDashboard();
            }

            document.addEventListener('visibilitychange', () => {
                if (!currentAttendant) return;
                if (document.visibilityState === 'visible') {
                    const statusToRestore = readPreferredStatus();
                    updateAttendantStatus(statusToRestore, { notify: false, persistPreferred: false });
                }
            });

            window.addEventListener('pagehide', () => {
                if (!currentAttendant) return;
                updateAttendantStatus('offline', { notify: false, keepalive: true, persistPreferred: false });
                stopPresenceHeartbeat();
            });

            window.addEventListener('beforeunload', () => {
                if (!currentAttendant) return;
                updateAttendantStatus('offline', { notify: false, keepalive: true, persistPreferred: false });
            });

            // Request notification permission
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
            
            // Close emoji picker when clicking outside
            document.addEventListener('click', (e) => {
                const picker = document.getElementById('emojiPicker');
                if (!e.target.closest('.emoji-picker') && !e.target.closest('[onclick="showEmojiPicker()"]')) {
                    picker.classList.remove('show');
                }
            });

            const historyModal = document.getElementById('historyModal');
            if (historyModal) {
                historyModal.addEventListener('click', (e) => {
                    if (e.target.id === 'historyModal') closeHistoryModal();
                });
            }

            const sessionReviewModal = document.getElementById('sessionReviewModal');
            if (sessionReviewModal) {
                sessionReviewModal.addEventListener('click', (e) => {
                    if (e.target.id === 'sessionReviewModal') closeSessionReviewModal();
                });
            }
        });

        // Refresh chats periodically
        setInterval(() => {
            if (currentAttendant) {
                loadChats();
                loadQueuePanel();
            }
        }, 10000);

        // Handle keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput')?.focus();
            }
            
            if (e.ctrlKey && e.key === 'Escape' && currentSession) {
                e.preventDefault();
                endSession();
            }
            
            if (e.ctrlKey && e.key === 'b' && currentSession) {
                e.preventDefault();
                toggleBotStatus();
            }
        });
    </script>
</body>

</html>
