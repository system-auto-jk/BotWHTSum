<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento WhatsApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #128c7e;
            --primary-dark: #0f6b61;
            --primary-light: #dcf8c6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --info: #0891b2;
            --bg: #ffffff;
            --bg-light: #f8fafc;
            --bg-lighter: #ece5dd;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-lighter);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }

        /* ===== ANIMAÇÕES ===== */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(30px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        @keyframes typing {
            0% {
                transform: translateY(0px);
            }

            28% {
                transform: translateY(-5px);
            }

            44% {
                transform: translateY(0px);
            }
        }

        /* ===== LOGIN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #5b7cef 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            top: -150px;
            left: -150px;
            animation: float 6s ease-in-out infinite;
        }

        .login-container::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite reverse;
        }

        .login-box {
            background: white;
            padding: 48px;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #5b7cef);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease;
        }

        .login-logo:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .login-header h1 {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .input-with-icon:focus-within i {
            color: var(--primary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--bg-light);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(91, 124, 239, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #5b7cef);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== MAIN LAYOUT ===== */
        .container {
            display: flex;
            height: 100vh;
            background: var(--bg-lighter);
        }

        .sidebar {
            width: 340px;
            background: #f8f9fa;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: width 0.3s ease;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar.collapsed .sidebar-header h1,
        .sidebar.collapsed .status-indicator span,
        .sidebar.collapsed .status-selector,
        .sidebar.collapsed .search-box input,
        .sidebar.collapsed .chat-item .chat-preview,
        .sidebar.collapsed .chat-name {
            display: none;
        }

        .sidebar.collapsed .chat-item {
            text-align: center;
            padding: 12px 4px;
        }

        .sidebar.collapsed .chat-item::before {
            content: "💬";
            font-size: 20px;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: #f0f2f5;
        }

        .sidebar-header h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .status-dot-inline {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot-inline.online {
            background: #10b981;
        }

        .status-dot-inline.busy {
            background: #f59e0b;
        }

        .status-dot-inline.offline {
            background: #6b7280;
            animation: none;
        }

        .status-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-selector select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-selector select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 124, 239, 0.1);
        }

        .sidebar-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--bg-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 16px;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .icon-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .search-box {
            padding: 16px 20px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-light);
            font-size: 13px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            position: relative;
        }

        .chat-item:hover {
            background: var(--bg-light);
            transform: translateX(2px);
        }

        .chat-item.active {
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
        }

        .chat-item.unread {
            background: rgba(91, 124, 239, 0.05);
        }

        .chat-item.unread::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 2s infinite;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-name i {
            font-size: 12px;
            color: var(--secondary);
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .chat-item-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #d1fae5;
            color: #065f46;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ===== MAIN AREA ===== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-lighter);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f2f5;
            box-shadow: var(--shadow-sm);
        }

        .chat-header-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header-title i {
            color: var(--secondary);
            font-size: 14px;
        }

        .chat-header-right {
            display: flex;
            gap: 8px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background:
                radial-gradient(circle at 20px 20px, rgba(15, 23, 42, 0.03) 2px, transparent 2px) 0 0 / 28px 28px,
                #efeae2;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }

        .message {
            margin-bottom: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            word-wrap: break-word;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
            max-width: 65%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        .message.client {
            background: #ffffff;
            color: #111827;
            margin-right: auto;
            margin-left: 20px;
            border-left: 1px solid #e5e7eb;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.attendant {
            background: #d9fdd3;
            color: #111827;
            margin-left: auto;
            margin-right: 20px;
            border-right: 1px solid #9ae6b4;
            align-self: flex-end;
            text-align: left;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: #fef3c7;
            color: #78350f;
            margin-left: auto;
            margin-right: 20px;
            border-right: 1px solid #fcd34d;
            align-self: flex-end;
            text-align: left;
            border-bottom-right-radius: 4px;
        }

        .message::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 12px;
            height: 12px;
            background: inherit;
        }

        .message.client::before {
            left: -8px;
            border-right: 2px solid #2196f3;
            border-bottom: 2px solid #2196f3;
            border-radius: 0 0 8px 0;
        }

        .message.attendant::before,
        .message.bot::before {
            right: -8px;
            border-left: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            border-radius: 0 0 0 8px;
        }

        .message-header {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .message-content {
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message-time {
            opacity: 0.6;
            font-size: 11px;
            margin-top: 2px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-light);
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 8px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-tertiary);
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 14px;
        }

        /* ===== QUICK ACTIONS ===== */
        .quick-actions-section {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .quick-actions-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .quick-action-btn {
            padding: 8px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: var(--text-primary);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .quick-action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* ===== CONTROL BAR ===== */
        .control-bar {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
            justify-content: space-between;
        }

        .control-stats {
            display: flex;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ===== CHAT INPUT ===== */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: white;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--bg-light);
            border-radius: 12px;
            padding: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 124, 239, 0.1);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: none;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            padding: 8px 0;
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: none;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 22px;
            max-height: 120px;
            padding: 6px 0;
            line-height: 1.4;
        }

        .input-wrapper input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .input-wrapper textarea:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .input-wrapper button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            transition: all 0.2s;
            padding: 6px;
        }

        .input-wrapper button:hover:not(:disabled) {
            color: var(--primary);
            transform: scale(1.1);
        }

        .input-wrapper button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #5b7cef);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            max-width: 420px;
            width: 90%;
            animation: slideIn 0.3s ease;
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-light);
            border-radius: 8px;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
        }

        .btn-secondary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== ALERT ===== */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease;
            z-index: 2000;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }

        .alert-info {
            background: #dbeafe;
            color: #0c2340;
            border: 1px solid #bfdbfe;
        }

        .alert-warning {
            background: #fef3c7;
            color: #78350f;
            border: 1px solid #fde68a;
        }

        .alert-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: currentColor;
            opacity: 0.3;
            animation: progress 3s linear;
        }

        @keyframes progress {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        /* ===== SCROLLBAR ===== */
        .chat-body::-webkit-scrollbar,
        .chats-list::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-track,
        .chats-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-body::-webkit-scrollbar-thumb,
        .chats-list::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .chat-body::-webkit-scrollbar-thumb:hover,
        .chats-list::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .no-chats {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .no-chats-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* ===== EMOJI PICKER ===== */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            padding: 12px;
            z-index: 100;
        }

        .emoji-picker.show {
            display: block;
            animation: slideIn 0.2s ease;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .emoji-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .emoji-btn:hover {
            background: var(--primary-light);
            transform: scale(1.1);
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }

            .sidebar.collapsed {
                width: 60px;
            }

            .message {
                max-width: 85%;
            }

            .quick-actions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                position: absolute;
                z-index: 100;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">💬</div>
                <h1>Atendimento</h1>
                <p>Painel estilo WhatsApp</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginInput">Login</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginInput" placeholder="Seu nome de usuario" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordInput">Senha</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordInput" placeholder="Sua senha" required>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="rememberMe" style="width: auto;">
                    <label for="rememberMe" style="margin: 0; font-weight: 400;">Lembrar de mim</label>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" style="display: none;">
        <div class="container">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h1>Conversas</h1>
                        <button class="icon-btn" id="toggleSidebarBtn" title="recolher barra lateral">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                    </div>
                    <div class="status-indicator">
                        <div class="status-dot-inline online" id="statusDotInline"></div>
                        <span id="statusTextInline">Disponível</span>
                    </div>

                    <div class="status-selector">
                        <select id="attendantStatusSelect" onchange="updateAttendantStatus(this.value)">
                            <option value="online">Disponível</option>
                            <option value="busy">Em atendimento</option>
                            <option value="offline">Offline</option>
                        </select>
                    </div>

                    <div class="sidebar-toolbar">
                        <button class="icon-btn" id="newChatBtn" title="Nova conversa">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="icon-btn" id="historyBtn" title="Historico de atendimento">
                            <i class="fas fa-history"></i>
                        </button>
                        <button class="icon-btn" id="statsBtn" title="Estatisticas">
                            <i class="fas fa-chart-bar"></i>
                            <span class="badge" id="statsBadge" style="display: none;">3</span>
                        </button>
                        <button class="icon-btn" id="settingsBtn" title="Configuracoes">
                            <i class="fas fa-cog"></i>
                        </button>
                        <button class="icon-btn" id="logoutBtn" title="Sair">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>

                    <div style="margin-top: 12px; padding: 10px; border: 1px solid #e5e7eb; border-radius: 10px; background: #f8fafc;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                            <strong style="font-size:12px;">Fila de Espera</strong>
                            <span id="queueCountBadge" style="font-size:12px; background:#f59e0b; color:#fff; border-radius:999px; padding:2px 8px;">0</span>
                        </div>
                        <div id="queuePreviewText" style="font-size:11px; color:#64748b; margin-bottom:8px;">Nenhum cliente aguardando.</div>
                        <div id="queueContactsList" style="display:flex; flex-direction:column; gap:6px; max-height:180px; overflow:auto;"></div>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Pesquisar clientes...">
                </div>

                <div class="chats-list" id="chatsList">
                    <div class="no-chats">
                        <div class="no-chats-icon"><i class="fas fa-comments"></i></div>
                        <div>Nenhuma conversa atribuida</div>
                    </div>
                </div>
            </div>

            <!-- Main Area -->
            <div class="main-area" id="mainArea">
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-comments"></i></div>
                    <div class="empty-state-text">Selecione uma conversa</div>
                    <div class="empty-state-subtext">Escolha um cliente da lista para iniciar o atendimento</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Emoji Picker -->
    <div class="emoji-picker" id="emojiPicker">
        <div class="emoji-grid">
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128522))">&#128522;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128514))">&#128514;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(10084,65039))">&#10084;&#65039;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128077))">&#128077;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128075))">&#128075;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128591))">&#128591;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128293))">&#128293;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(10024))">&#10024;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(11088))">&#11088;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(127881))">&#127881;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(129300))">&#129300;</button>
            <button class="emoji-btn" onclick="insertEmoji(String.fromCodePoint(128064))">&#128064;</button>
        </div>
    </div>

    <div id="floatingAlertContainer" style="position: fixed; top: 20px; right: 20px; max-width: 400px; z-index: 999;">
    </div>

    <div id="historyModal" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,.45); z-index: 1200; align-items:center; justify-content:center; padding:16px;">
        <div style="width:min(980px, 100%); height:min(82vh, 760px); background:#fff; border-radius:12px; display:grid; grid-template-columns:320px 1fr; overflow:hidden; box-shadow: 0 20px 40px rgba(0,0,0,.25);">
            <div style="border-right:1px solid #e5e7eb; display:flex; flex-direction:column;">
                <div style="padding:12px 14px; border-bottom:1px solid #e5e7eb; font-weight:700; display:flex; justify-content:space-between; align-items:center;">
                    <span>Historico de atendimentos</span>
                    <button class="icon-btn" onclick="closeHistoryModal()" title="Fechar"><i class="fas fa-times"></i></button>
                </div>
                <div id="historyListContainer" style="overflow:auto; padding:8px;"></div>
            </div>
            <div style="display:flex; flex-direction:column;">
                <div id="historyConversationHeader" style="padding:12px 14px; border-bottom:1px solid #e5e7eb; font-weight:600;">Selecione um numero</div>
                <div id="historyConversationBody" style="padding:12px; overflow:auto; flex:1; background:#f8fafc;"></div>
            </div>
        </div>
    </div>

    <div id="sessionReviewModal" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,.45); z-index: 1300; align-items:center; justify-content:center; padding:16px;">
        <div style="width:min(560px, 100%); background:#fff; border-radius:12px; box-shadow:0 20px 40px rgba(0,0,0,.25); overflow:hidden;">
            <div style="padding:14px 16px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
                <strong>Finalizar Atendimento</strong>
                <button class="icon-btn" onclick="closeSessionReviewModal()"><i class="fas fa-times"></i></button>
            </div>
            <div style="padding:16px;">
                <div class="form-group">
                    <label>Como foi o atendimento?</label>
                    <select id="reviewRating">
                        <option value="excelente">Excelente</option>
                        <option value="bom">Bom</option>
                        <option value="regular">Regular</option>
                        <option value="ruim">Ruim</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Qual foi a natureza do atendimento?</label>
                    <select id="reviewNature" onchange="updateReviewOutcomeOptions()">
                        <option value="duvida">Duvida</option>
                        <option value="suporte_tecnico">Suporte tecnico</option>
                        <option value="financeiro">Financeiro</option>
                        <option value="comercial">Comercial</option>
                        <option value="contratacao">Contratacao</option>
                        <option value="cancelamento">Cancelamento</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Resultado do atendimento</label>
                    <select id="reviewOutcome"></select>
                </div>
                <div class="form-group">
                    <label>Observacoes (opcional)</label>
                    <textarea id="reviewNotes" rows="3" placeholder="Resumo rapido do que ocorreu"></textarea>
                </div>
            </div>
            <div style="padding:12px 16px; border-top:1px solid #e5e7eb; display:flex; gap:8px; justify-content:flex-end;">
                <button class="btn btn-secondary" onclick="closeSessionReviewModal()">Cancelar</button>
                <button class="btn btn-danger" onclick="submitSessionReviewAndEnd()"><i class="fas fa-check"></i> Finalizar</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentChat = null;
        let currentSession = null;
        let currentAttendant = null;
        let lastMessageCount = 0;
        let historyRefreshInterval = null;
        let unreadCount = 0;
        let typingTimeout = null;
        let sessionTimerInterval = null;
        let presenceHeartbeatInterval = null;
        let listenersBound = false;
        let isSidebarCollapsed = false;

        // Frases rápidas padrão
        const quickPhrases = [
            { text: 'Ola! Como posso ajudar voce hoje?', icon: String.fromCodePoint(128172) },
            { text: 'Perfeito, ja estou verificando para voce.', icon: String.fromCodePoint(9203) },
            { text: 'Obrigado pela paciencia. Seguimos no seu atendimento.', icon: String.fromCodePoint(128591) },
            { text: 'Se quiser, posso transferir para um especialista.', icon: String.fromCodePoint(128100) },
            { text: 'Consegui resolver sua solicitacao por aqui.', icon: String.fromCodePoint(9989) },
            { text: 'Posso ajudar em mais alguma coisa?', icon: String.fromCodePoint(10067) }
        ];

        // Emojis comuns
        const commonEmojis = [
            String.fromCodePoint(128522), String.fromCodePoint(128514), String.fromCodePoint(10084, 65039),
            String.fromCodePoint(128077), String.fromCodePoint(128075), String.fromCodePoint(128591),
            String.fromCodePoint(128293), String.fromCodePoint(10024), String.fromCodePoint(11088),
            String.fromCodePoint(127881), String.fromCodePoint(129300), String.fromCodePoint(128064)
        ];

        // ===== UTILITÁRIOS =====
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'agora';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} min`;
            if (diff < 86400000) return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }

        function showAlert(message, type, duration = 3000) {
            const container = document.getElementById('floatingAlertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle',
                warning: 'fa-exclamation-triangle'
            };
            
            alert.innerHTML = `
                <i class="fas ${icons[type] || icons.info}"></i>
                <span>${message}</span>
                <div class="alert-progress" style="animation-duration: ${duration}ms"></div>
            `;
            
            container.appendChild(alert);

            setTimeout(() => {
                alert.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => alert.remove(), 300);
            }, duration);
        }

        function normalizeStatus(status) {
            return ['online', 'busy', 'offline'].includes(status) ? status : 'online';
        }

        function readPreferredStatus() {
            return normalizeStatus(
                localStorage.getItem('attendantPreferredStatus')
                || sessionStorage.getItem('attendantPreferredStatus')
                || currentAttendant?.status
                || 'online'
            );
        }

        function persistPreferredStatus(status) {
            const normalized = normalizeStatus(status);
            if (localStorage.getItem('rememberMe')) {
                localStorage.setItem('attendantPreferredStatus', normalized);
            } else {
                sessionStorage.setItem('attendantPreferredStatus', normalized);
            }
        }

        // ===== LOGIN =====
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const login = document.getElementById('loginInput').value;
            const password = document.getElementById('passwordInput').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            try {
                const response = await fetch(`${API_BASE}/attendance/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    currentAttendant = data.attendant;
                    currentAttendant.status = 'online';

                    if (rememberMe) {
                        localStorage.setItem('attendantId', currentAttendant.id);
                        localStorage.setItem('attendantName', currentAttendant.name);
                        localStorage.setItem('attendantStatus', 'online');
                        localStorage.setItem('attendantPreferredStatus', 'online');
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        sessionStorage.setItem('attendantId', currentAttendant.id);
                        sessionStorage.setItem('attendantName', currentAttendant.name);
                        sessionStorage.setItem('attendantStatus', 'online');
                        sessionStorage.setItem('attendantPreferredStatus', 'online');
                    }

                    showDashboard();
                    showAlert(`Bem-vindo, ${currentAttendant.name}!`, 'success');
                } else {
                    const error = await response.json();
                    showAlert(error.error || error.message || 'Login falhou', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                showAlert('Erro de conexão', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            currentAttendant.status = 'online';
            updateStatusUI(currentAttendant.status);
            updateAttendantStatus(currentAttendant.status, { notify: false, persistPreferred: false });
            persistPreferredStatus('online');
            startPresenceHeartbeat();
            loadQuickPhrases();
            loadChats();
            loadQueuePanel();
            setupEventListeners();
        }

        async function loadQuickPhrases() {
            try {
                const response = await fetch(`${API_BASE}/attendance/macros`);
                if (!response.ok) return;
                const data = await response.json();
                const macros = (data.macros || []).filter(m => m.approved !== false);
                if (!macros.length) return;

                quickPhrases = macros.slice(0, 12).map(m => ({
                    text: m.text,
                    icon: '⚡'
                }));

                if (currentSession) {
                    renderQuickActions();
                }
            } catch (error) {
                console.error('Erro ao carregar macros de atendimento:', error);
            }
        }

        // ===== EVENT LISTENERS =====
        function setupEventListeners() {
            if (listenersBound) return;
            listenersBound = true;

            // Toggle sidebar
            document.getElementById('toggleSidebarBtn').addEventListener('click', toggleSidebar);
            
            // Nova conversa
            document.getElementById('newChatBtn').addEventListener('click', () => {
                showAlert('Nova conversa em breve!', 'info');
            });

            const historyBtn = document.getElementById('historyBtn');
            if (historyBtn) {
                historyBtn.addEventListener('click', openHistoryModal);
            }
            
            // Estatísticas
            document.getElementById('statsBtn').addEventListener('click', () => {
                showAlert('Estatísticas em desenvolvimento', 'info');
            });
            
            // Configurações
            document.getElementById('settingsBtn').addEventListener('click', () => {
                showAlert('Configurações em breve', 'info');
            });
            
            // Logout
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            // Search debounce
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const query = e.target.value.toLowerCase();
                    filterChats(query);
                }, 300);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('toggleSidebarBtn');

            if (window.matchMedia('(max-width: 480px)').matches) {
                sidebar.classList.toggle('show');
                toggleBtn.innerHTML = sidebar.classList.contains('show')
                    ? '<i class="fas fa-times"></i>'
                    : '<i class="fas fa-bars"></i>';
                return;
            }

            isSidebarCollapsed = !isSidebarCollapsed;

            if (isSidebarCollapsed) {
                sidebar.classList.add('collapsed');
                toggleBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            } else {
                sidebar.classList.remove('collapsed');
                toggleBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            }
        }

        function filterChats(query) {
            document.querySelectorAll('.chat-item').forEach(item => {
                const name = item.querySelector('.chat-name').textContent.toLowerCase();
                const preview = item.querySelector('.chat-preview')?.textContent.toLowerCase() || '';
                const matches = name.includes(query) || preview.includes(query);
                item.style.display = matches ? '' : 'none';
            });
        }

        async function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                await updateAttendantStatus('offline', { notify: false, keepalive: true });
                stopPresenceHeartbeat();

                localStorage.removeItem('attendantId');
                localStorage.removeItem('attendantName');
                localStorage.removeItem('attendantStatus');
                localStorage.removeItem('attendantPreferredStatus');
                localStorage.removeItem('rememberMe');
                sessionStorage.clear();
                
                if (historyRefreshInterval) {
                    clearInterval(historyRefreshInterval);
                }
                if (sessionTimerInterval) {
                    clearInterval(sessionTimerInterval);
                    sessionTimerInterval = null;
                }

                currentAttendant = null;
                currentSession = null;
                currentChat = null;
                lastMessageCount = 0;
                
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardScreen').style.display = 'none';
                document.getElementById('loginInput').value = '';
                document.getElementById('passwordInput').value = '';
                document.getElementById('rememberMe').checked = false;
                
                showAlert('Você saiu do sistema', 'info');
            }
        }

        // ===== CARREGAR CONVERSAS =====
        async function loadChats() {
            try {
                const response = await fetch(`${API_BASE}/attendance/sessions?attendantId=${currentAttendant.id}`);
                if (response.ok) {
                    const chats = await response.json();
                    chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                    renderChatsList(chats);
                    updateUnreadCount(chats);
                }
            } catch (error) {
                console.error('Erro ao carregar conversas:', error);
            }
        }

        function renderChatsList(chats) {
            const chatsList = document.getElementById('chatsList');

            if (!chats || chats.length === 0) {
                chatsList.innerHTML = `
                    <div class="no-chats">
                        <div class="no-chats-icon">💬</div>
                        <div style="font-weight: 600; margin-bottom: 4px;">Nenhuma conversa</div>
                        <div style="font-size: 12px;">Novas conversas aparecerão aqui</div>
                    </div>
                `;
                return;
            }

            const html = chats.map(chat => {
                const isUnread = chat.unreadCount > 0;
                const time = formatTime(chat.lastMessageTime || Date.now());
                const safeName = escapeHtml(chat.clientName || 'Cliente');
                const safePreview = escapeHtml(chat.lastMessage || 'Nenhuma mensagem');
                const initials = safeName.trim().split(/\s+/).slice(0, 2).map(v => v[0]?.toUpperCase() || '').join('');
                
                return `
                    <div class="chat-item ${currentChat?.sessionId === chat.sessionId ? 'active' : ''} ${isUnread ? 'unread' : ''}" 
                         data-session-id="${chat.sessionId}"
                         data-client-jid="${chat.clientJid}"
                         data-client-name="${safeName}"
                         onclick="selectChatFromElement(this)">
                        <div class="chat-item-top">
                            <div class="chat-avatar">${initials || 'C'}</div>
                            <div class="chat-name">${safeName}</div>
                        </div>
                        <div class="chat-preview">${safePreview}</div>
                        <div class="chat-time">${time}</div>
                    </div>
                `;
            }).join('');

            chatsList.innerHTML = html;
        }

        function selectChatFromElement(el) {
            const sessionId = el.dataset.sessionId;
            const jid = el.dataset.clientJid;
            const name = el.dataset.clientName;
            if (!sessionId || !jid || !name) return;
            selectChat(sessionId, name, jid);
        }

        function updateUnreadCount(chats) {
            unreadCount = chats.reduce((total, chat) => total + (chat.unreadCount || 0), 0);
            const statsBadge = document.getElementById('statsBadge');
            
            if (unreadCount > 0) {
                statsBadge.style.display = 'block';
                statsBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            } else {
                statsBadge.style.display = 'none';
            }
            
            // Update page title with unread count
            document.title = unreadCount > 0 ? `(${unreadCount}) Atendimento WhatsApp` : 'Atendimento WhatsApp';
        }

        async function selectChat(sessionId, name, jid) {
            currentChat = { sessionId, name, jid };

            if (window.matchMedia('(max-width: 480px)').matches) {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('show');
                const toggleBtn = document.getElementById('toggleSidebarBtn');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
            }

            // Update active state
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.sessionId === sessionId) {
                    item.classList.add('active');
                    item.classList.remove('unread');
                }
            });

            try {
                const response = await fetch(`${API_BASE}/attendance/session/${jid}`);
                if (response.ok) {
                    currentSession = await response.json();
                    renderChatView(name);
                    loadChats(); // Refresh list to update unread counts
                } else {
                    showAlert('Erro ao carregar conversa', 'error');
                }
            } catch (error) {
                console.error('Erro ao carregar sessão:', error);
                showAlert('Erro ao carregar conversa', 'error');
            }
        }

            mainArea.innerHTML = `
                <div class="chat-header">

                        <i class="fas fa-circle" style="color: ${currentSession.clientStatus === 'online' ? '#10b981' : '#6b7280'}; font-size: 8px;"></i>

                        <span style="font-size: 11px; color: var(--text-secondary); font-weight: 400;">

                    </div>
                    <div class="chat-header-right">
                        <button class="icon-btn" onclick="toggleBotStatus()" title="${currentSession.botEnabled ? 'Desativar bot' : 'Ativar bot'}">
                            <i class="fas fa-robot" style="color: ${currentSession.botEnabled ? 'var(--primary)' : 'inherit'}"></i>
                        </button>
                        <button class="icon-btn" onclick="showEmojiPicker()" title="Emojis">

                <div class="chat-body" id="chatBody">
                    <div style="text-align: center; color: var(--text-tertiary); padding: 20px;">

                    </div>
                </div>

                <div class="typing-indicator" id="typingIndicator" style="display: none; margin-left: 20px;">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="quick-actions-section">
                    <div class="quick-actions-title">Respostas Rápidas</div>
                    <div class="quick-actions-grid" id="quickActionsGrid"></div>
                </div>

                <div class="control-bar">
                    <div class="control-stats">
                        <div class="stat-item">
                            <i class="fas fa-clock"></i>
                            <span>Tempo: <span class="stat-value" id="sessionTimer">00:00</span></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-robot"></i>
                            <span>Bot: <span class="stat-value" id="botStatusText">${currentSession.botEnabled ? 'Ativo' : 'Inativo'}</span></span>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="Digite uma mensagem"
                               rows="1" ${!currentSession.botEnabled ? '' : 'disabled'}></textarea>
                        <button onclick="attachFile()" title="Anexar arquivo" ${!currentSession.botEnabled ? '' : 'disabled'}>
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <button onclick="showEmojiPicker()" title="Emojis" ${!currentSession.botEnabled ? '' : 'disabled'}>
                            <i class="far fa-smile"></i>

            renderQuickActions();
            loadChatHistory();
            startSessionTimer();
            updateBotStatus();
            loadHandoffContext();

            if (historyRefreshInterval) {
                clearInterval(historyRefreshInterval);
            }
            historyRefreshInterval = setInterval(() => {
                checkNewMessages();
            }, 1000);

            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey && !currentSession.botEnabled) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
                
                messageInput.addEventListener('input', (e) => {
                    const target = e.target;
                    target.style.height = 'auto';
                    target.style.height = `${Math.min(target.scrollHeight, 120)}px`;
                    handleTyping();
